

name: 'ITGC'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'ITGC'


model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"



models:
  ITGC:
    bronze_staging:        
      +materialized: view
      +schema: bronze_staging
    silver_intermediate:
      +materialized: view
      +schema: silver_intermediate
    gold_marts:
      +materialized: table
      +schema: gold_marts
